version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: course_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-course_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./Recommender-System-api
    container_name: course_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-course_db}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db


  frontend:
    build: ./Recommender-System-Web
    container_name: course_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://rp25us2-vm2.sit.kmutt.ac.th:8000
    depends_on:
      - backend

volumes:
  postgres_data: